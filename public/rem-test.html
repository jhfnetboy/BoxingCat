<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Rem Live2D</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>
<canvas id="live2d" width="400" height="600"></canvas>

<script src="/vendor/live2dcubismcore.min.js"></script>
<script src="/vendor/live2d.min.js"></script>
<script src="/vendor/pixi.min.js"></script>
<script src="/vendor/cubism2.min.js"></script>
<script>
(function() {
var canvas = document.getElementById("live2d");
var app = new PIXI.Application({ view: canvas, width: 400, height: 600, backgroundAlpha: 0 });
var statusEl = null; // no debug overlay

PIXI.live2d.Live2DModel.from("/assets/live2d/rem/rem.model.json", { autoInteract: true }).then(function(model) {
  model.anchor.set(0.5, 0.5);
  model.position.set(200, 300);
  var baseScale = Math.min(400 / model.width, 600 / model.height) * 0.8;
  model.scale.set(baseScale);
  app.stage.addChild(model);

  // --- Drag to move pet | Click to interact ---
  var dragging = false, dragOfs = { x: 0, y: 0 }, startPos = { x: 0, y: 0 };

  model.on("pointerdown", function(e) {
    dragging = true;
    startPos.x = model.x; startPos.y = model.y;
    dragOfs.x = e.data.global.x - model.x;
    dragOfs.y = e.data.global.y - model.y;
  });

  model.on("pointermove", function(e) {
    if (!dragging) return;
    model.position.x = e.data.global.x - dragOfs.x;
    model.position.y = e.data.global.y - dragOfs.y;
  });

  model.on("pointerup", function() {
    var dist = Math.sqrt(Math.pow(model.x - startPos.x, 2) + Math.pow(model.y - startPos.y, 2));
    if (dist < 4) model.motion("tap_body"); // click, not drag
    dragging = false;
  });
  model.on("pointerupoutside", function() { dragging = false; });
}).catch(function(e) {
  console.error("Rem load error:", e);
});
})();
</script>
</body>
</html>
