<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxingCat Pet</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; cursor: grab; }
  </style>
</head>
<body>
<canvas id="live2d" width="400" height="600"></canvas>

<script src="/vendor/live2dcubismcore.min.js"></script>
<script src="/vendor/live2d.min.js"></script>
<script src="/vendor/pixi.min.js"></script>
<script src="/vendor/cubism2.min.js"></script>
<script>
(async function() {
var canvas = document.getElementById("live2d");
var app = new PIXI.Application({ view: canvas, width: 400, height: 600, backgroundAlpha: 0 });

// ── Tauri window drag via startDragging() ──
var isDragging = false;
var moved = false;

canvas.addEventListener("mousedown", async function(e) {
  moved = false;
  isDragging = true;
  try { await window.__TAURI__.window.getCurrentWindow().startDragging(); }
  catch(_) { /* fallback: try data attribute */ }
  isDragging = false;
  if (!moved) {
    // Short click = interact with model
    if (window._model) window._model.motion("tap_body");
  }
});

document.addEventListener("mousemove", function() { if (isDragging) moved = true; });
document.addEventListener("mouseup", function() { isDragging = false; });

// ── Load Rem ──
PIXI.live2d.Live2DModel.from("/assets/live2d/rem/rem.model.json", { autoInteract: true }).then(function(model) {
  window._model = model;
  model.anchor.set(0.5, 0.5);
  model.position.set(200, 300);
  model.scale.set(Math.min(400 / model.width, 600 / model.height) * 0.8);
  app.stage.addChild(model);
}).catch(function(e) { console.error("Rem:", e); });
})();
</script>
</body>
</html>
