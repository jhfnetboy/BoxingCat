<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxingCat Pet</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; display: flex; flex-direction: column; }
    /* 整窗可拖：默认 grab 光标，拖动时 grabbing */
    body { cursor: grab; }
    body.dragging { cursor: grabbing; }
    .pet-content { flex: 1; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; }
  </style>
</head>
<body>
<div class="pet-content">
<canvas id="live2d" width="400" height="600"></canvas>
</div>

<script>
// ── 整窗拖拽：窗口任意位置按下并拖动即可移动 pet 窗口 ──
// 用移动阈值区分「点击角色」与「拖动窗口」：移动 < 阈值视为点击，放行给 Live2D。
(function() {
  var DRAG_THRESHOLD = 4; // px
  var started = false, dragging = false, startX = 0, startY = 0, winPos = null, appWin = null;

  function getWin() {
    var T = window.__TAURI__;
    return (T && T.window && T.window.getCurrentWindow) ? T.window.getCurrentWindow() : null;
  }
  function physPos(x, y) {
    var T = window.__TAURI__;
    var P = (T.window && T.window.PhysicalPosition) || (T.dpi && T.dpi.PhysicalPosition);
    return new P(x, y);
  }

  document.addEventListener("mousedown", async function(e) {
    if (e.button !== 0) return; // 仅左键
    appWin = getWin();
    if (!appWin) {
      console.warn("[pet] Tauri API 不可用 — 请确认 tauri.conf.json 已开启 withGlobalTauri");
      return;
    }
    started = true; dragging = false;
    startX = e.screenX; startY = e.screenY;
    try {
      winPos = await appWin.outerPosition();
    } catch (err) {
      console.error("[pet] outerPosition 失败:", err);
      started = false;
    }
  });

  document.addEventListener("mousemove", function(e) {
    if (!started || !winPos) return;
    var dx = e.screenX - startX, dy = e.screenY - startY;
    if (!dragging && (Math.abs(dx) + Math.abs(dy)) < DRAG_THRESHOLD) return; // 还算点击
    if (!dragging) { dragging = true; document.body.classList.add("dragging"); }
    appWin.setPosition(physPos(winPos.x + dx, winPos.y + dy));
  });

  function endDrag() {
    started = false; dragging = false; winPos = null;
    document.body.classList.remove("dragging");
  }
  document.addEventListener("mouseup", endDrag);
  window.addEventListener("blur", endDrag); // 拖出窗口/失焦时复位
})();
</script>

<script src="/vendor/live2dcubismcore.min.js"></script>
<script src="/vendor/live2d.min.js"></script>
<script src="/vendor/pixi.min.js"></script>
<script src="/vendor/cubism2.min.js"></script>
<script>
(async function() {
var canvas = document.getElementById("live2d");
var app = new PIXI.Application({ view: canvas, width: 400, height: 600, backgroundAlpha: 0 });

// ── Click to interact ──
canvas.addEventListener("click", function() {
  if (window._model) window._model.motion("tap_body");
});

// ── Load Rem ──
PIXI.live2d.Live2DModel.from("/assets/live2d/rem/rem.model.json", { autoInteract: true }).then(function(model) {
  window._model = model;
  model.anchor.set(0.5, 0.5);
  model.position.set(200, 300);
  model.scale.set(Math.min(400 / model.width, 600 / model.height) * 0.8);
  app.stage.addChild(model);
}).catch(function(e) { console.error("Rem:", e); });
})();
</script>
</body>
</html>
